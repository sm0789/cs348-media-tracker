{% extends "base.html" %}
{% block title %}{{ action }} Media Item — MediaTracker{% endblock %}

{% block content %}
<div class="page-header">
  <h1>{{ action }} Media Item</h1>
  <a href="/" class="btn btn-secondary">← Back</a>
</div>

<div class="card">
  <form method="post">
    <div class="form-grid">

      <div class="form-group full">
        <label for="title">Title</label>
        <input
          type="text"
          id="title"
          name="title"
          required
          placeholder="e.g. The Dark Knight"
          value="{{ item.title if item else '' }}"
        />
      </div>

      <div class="form-group">
        <label for="type">Type</label>
        <select id="type" name="type" required>
          <option value="">— Select type —</option>
          {% for t in ['Movie', 'Book', 'Game', 'TV Show'] %}
            <option value="{{ t }}" {% if item and item.type == t %}selected{% endif %}>{{ t }}</option>
          {% endfor %}
        </select>
      </div>

      <div class="form-group">
        <label for="genre">Genre</label>
        <input
          type="text"
          id="genre"
          name="genre"
          required
          placeholder="e.g. Sci-Fi, Action, RPG"
          value="{{ item.genre if item else '' }}"
        />
      </div>

      <div class="form-group">
        <label for="release_year">Release Year</label>
        <input
          type="number"
          id="release_year"
          name="release_year"
          required
          min="1800"
          max="2100"
          placeholder="e.g. 2024"
          value="{{ item.release_year if item else '' }}"
        />
      </div>

      <div class="form-group full">
        <label for="description">Description</label>
        <textarea
          id="description"
          name="description"
          placeholder="Brief description of the title..."
        >{{ item.description if item else '' }}</textarea>
      </div>

    </div>

    <div style="margin-top: 1.5rem; display: flex; gap: 1rem;">
      <button type="submit" class="btn btn-primary">
        {% if action == 'Add' %}Add Item{% else %}Save Changes{% endif %}
      </button>
      <a href="/" class="btn btn-secondary">Cancel</a>
    </div>
  </form>
</div>
{% endblock %}
